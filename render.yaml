services:
  - type: web
    name: descubranv
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
    disk:
      name: dados
      mountPath: /opt/render/project/src/dados
      sizeGB: 1
