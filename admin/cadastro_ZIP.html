<!DOCTYPE html>
<html lang="pt-BR" x-data="zipUploadApp()">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload ZIP | Turismo NV</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="auth.js"></script>
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-gray-100 min-h-screen p-6 md:p-12 font-sans">
  <div x-show="toast.show" x-cloak
       :class="toast.ok ? 'bg-[#0f5132] text-white' : 'bg-red-600 text-white'"
       class="fixed bottom-8 right-8 px-5 py-3 rounded-xl text-sm font-bold shadow-lg z-50"
       x-text="toast.msg"></div>

  <div class="max-w-2xl mx-auto">
    <div class="mb-4">
      <a href="./listar_cadastros.html" class="text-xs font-black uppercase text-gray-500 hover:text-[#0f5132]">← Voltar</a>
    </div>

    <div class="bg-white rounded-3xl shadow-xl p-8">
      <h1 class="text-2xl font-black italic text-[#0f5132]">Atualização Offline (ZIP)</h1>
      <p class="text-sm text-gray-500 mt-2">Envie um arquivo ZIP com os dados para o servidor processar.</p>

      <label class="block mt-8 text-[11px] font-black uppercase text-gray-400">Arquivo ZIP</label>
      <input type="file" accept=".zip,application/zip" @change="onFile($event)"
             class="mt-2 w-full p-3 rounded-xl border bg-gray-50">

      <p class="text-xs text-gray-500 mt-3" x-show="selectedFile">
        Selecionado: <span class="font-semibold" x-text="selectedFile?.name"></span>
      </p>

      <button @click="enviar()" :disabled="loading"
              class="mt-8 w-full bg-[#0f5132] text-white py-4 rounded-2xl font-black uppercase disabled:opacity-40">
        <span x-text="loading ? 'Enviando...' : 'Enviar ZIP para o servidor'"></span>
      </button>
    </div>
  </div>

  <script>
    function zipUploadApp() {
      return {
        loading: false,
        selectedFile: null,
        toast: { show: false, msg: '', ok: true },

        notify(msg, ok = true) {
          this.toast = { show: true, msg, ok };
          setTimeout(() => (this.toast.show = false), 3000);
        },

        onFile(event) {
          this.selectedFile = (event.target.files || [])[0] || null;
        },

        async enviar() {
          if (!this.selectedFile) {
            this.notify('Selecione um arquivo ZIP', false);
            return;
          }
          if (!this.selectedFile.name.toLowerCase().endsWith('.zip')) {
            this.notify('Formato inválido. Use .zip', false);
            return;
          }

          this.loading = true;
          try {
            const form = new FormData();
            form.append('file', this.selectedFile);

            const res = await API.uploadZip(form);
            const json = await res.json();
            if (!res.ok || !json.success) {
              throw new Error(json.erro || json.message || 'Falha no upload');
            }

            this.notify('Upload concluído com sucesso!');
            setTimeout(() => (window.location.href = 'listar_cadastros.html'), 900);
          } catch (error) {
            this.notify(error.message || 'Erro ao enviar ZIP', false);
          } finally {
            this.loading = false;
          }
        }
      };
    }
  </script>
</body>
</html>
