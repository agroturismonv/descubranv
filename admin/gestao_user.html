<!DOCTYPE html>
<html lang="pt-BR" x-data="userApp()" x-init="init()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Usuários | Turismo NV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="auth.js"></script>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-gray-100 p-10 font-sans">
    <div class="max-w-2xl mx-auto space-y-8">

        <!-- Formulário de Novo Usuário -->
        <div class="bg-white p-10 rounded-[3rem] shadow-xl">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-3xl font-black text-[#0f5132] uppercase italic">Novo Usuário</h2>
                <a href="./dashboard.html" class="text-xs font-black uppercase text-gray-500 hover:text-[#0f5132]">← Voltar</a>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black uppercase text-gray-400 mb-2 ml-4">Nome de Usuário</label>
                    <input type="text" x-model="novoUser.username"
                        class="w-full p-4 bg-gray-50 rounded-2xl border-2 border-transparent focus:border-[#ffc107] outline-none transition-all">
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase text-gray-400 mb-2 ml-4">Senha Inicial</label>
                    <input type="password" x-model="novoUser.password"
                        class="w-full p-4 bg-gray-50 rounded-2xl border-2 border-transparent focus:border-[#ffc107] outline-none transition-all">
                    <p class="text-[9px] text-gray-400 ml-4 mt-1">A senha será armazenada como hash SHA-256</p>
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase text-gray-400 mb-2 ml-4">Nível de Acesso</label>
                    <select x-model="novoUser.level"
                        class="w-full p-4 bg-gray-50 rounded-2xl border-2 border-transparent focus:border-[#ffc107] outline-none transition-all">
                        <option value="admin">Administrador</option>
                        <option value="master">Master</option>
                    </select>
                </div>

                <button @click="adicionarUsuario()"
                    :disabled="!novoUser.username || !novoUser.password"
                    class="w-full bg-[#0f5132] text-white py-4 rounded-2xl font-black uppercase hover:bg-[#0a3d26] transition-all disabled:opacity-40 disabled:cursor-not-allowed">
                    Adicionar à Lista
                </button>

                <p x-show="feedback" x-cloak class="text-green-600 font-bold text-center text-sm" x-text="feedback"></p>
            </div>
        </div>

        <!-- Lista de Usuários -->
        <div class="bg-white p-10 rounded-[3rem] shadow-xl">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-black text-[#0f5132] uppercase italic">Usuários Cadastrados</h3>
                <span class="text-[10px] font-black bg-gray-100 px-3 py-1 rounded-full" x-text="usuarios.length + ' usuário(s)'"></span>
            </div>

            <div x-show="usuarios.length === 0" class="text-center py-6 text-gray-400 text-xs font-bold uppercase">
                Nenhum usuário carregado
            </div>

            <div class="space-y-3">
                <template x-for="(u, i) in usuarios" :key="i">
                    <div class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl">
                        <div>
                            <p class="font-black text-[#0f5132] text-sm" x-text="u.username"></p>
                            <p class="text-[9px] font-bold uppercase text-gray-400 mt-0.5"
                               :class="u.level === 'master' ? 'text-amber-600' : ''" x-text="u.level"></p>
                        </div>
                        <button @click="removerUsuario(i)"
                            x-show="u.username !== sessionStorage.getItem('admin_user')"
                            class="text-red-400 hover:text-red-600 text-xs font-black uppercase transition-all">
                            Remover
                        </button>
                    </div>
                </template>
            </div>

            <p class="text-[11px] text-gray-500 text-center mt-6 leading-relaxed">
                As alterações são salvas diretamente no servidor.
            </p>
        </div>
    </div>

    <script>
    function userApp() {
        return {
            usuarios: [],
            novoUser: { username: '', password: '', level: 'admin' },
            feedback: '',
            carregando: false,

            async init() {
                try {
                    await this.carregarUsuarios();
                } catch (e) {
                    console.warn('Erro ao carregar usuários:', e);
                }
            },

            async carregarUsuarios() {
                const resp = await apiRequest('/api/users');
                this.usuarios = resp.data || [];
            },

            async adicionarUsuario() {
                if (!this.novoUser.username || !this.novoUser.password) return;
                try {
                    this.carregando = true;
                    await apiRequest('/api/users', {
                        method: 'POST',
                        body: JSON.stringify(this.novoUser)
                    });

                    this.feedback = `✅ Usuário "${this.novoUser.username}" adicionado com sucesso.`;
                    this.novoUser = { username: '', password: '', level: 'admin' };
                    await this.carregarUsuarios();
                    setTimeout(() => this.feedback = '', 5000);
                } catch (e) {
                    alert(e.message || 'Erro ao adicionar usuário.');
                } finally {
                    this.carregando = false;
                }
            },

            async removerUsuario(i) {
                const user = this.usuarios[i];
                if (!confirm(`Remover o usuário "${user.username}"?`)) return;

                try {
                    await apiRequest(`/api/users/${encodeURIComponent(user.username)}`, {
                        method: 'DELETE'
                    });
                    this.feedback = `✅ Usuário "${user.username}" removido.`;
                    await this.carregarUsuarios();
                    setTimeout(() => this.feedback = '', 5000);
                } catch (e) {
                    alert(e.message || 'Erro ao remover usuário.');
                }
            }
        }
    }
    </script>
</body>
</html>
